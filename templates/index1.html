<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spam Email Detection</title>
    <style>
        body{
            font-family: 'Times New Roman', Times, serif;
            background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
            text-align: center;
            color: white;
        }
        .container{
            background: linear-gradient(to right, #ff7e5f, #feb47b);
            color: black;
            padding: 30px;
            margin: 80px auto;
            width: 50%;
            border-radius: 10px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.2);

        }
        .note{
             font-size: 14px;
            color: black;
        }
        textarea{
              width: 90%;
            height: 120px;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 14px;
            background: #f3e8ff;
            color: #3b2f5a;
        }
        h1 {
            margin-bottom: 20px;
        }
        button {
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border: 1px solid black;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

         button:hover {
            background: #5a67d8;
        }

        .result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }
    </style>

</head>
<body>
    <div class="container">
        <h1>Email Spam Detection</h1>
        <p class="note">Enter Email</p>
   
    <form action="/predict" method = "POST">
        <textarea name="E-mail"></textarea>
        <br>
        <button type="submit">Predict</button>
    </form>
    <!-- Prediction Result -->
        {% if prediction_text %}
            <div class="result">
                {{ prediction_text }}
            </div>
        {% endif %}

    </div>

</body>
</html>
